version: "3.9"

services:
  app:
    build: .
    container_name: agentic-ai-app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chroma
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    container_name: agentic-ai-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agentic-ai-redis
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    container_name: agentic-ai-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  pgdata:
  chroma_data:
